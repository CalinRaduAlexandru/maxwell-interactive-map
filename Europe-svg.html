<?xml version="1.0"?><svg
  baseprofile="tiny"
  fill="#E5E5E5"
  height="684"
  stroke="black"
  stroke-linecap="round"
  stroke-linejoin="round"
  stroke-width=".1"
  version="1.2"

  preserveAspectRatio="xMidYMid meet"
  width="100%"
  height="100%"
  xmlns="http://www.w3.org/2000/svg"
>
  <style>
    @keyframes mapReveal {
      0% {
        opacity: 0;
        transform: scale(0.985);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes legendDropIn {
      0% {
        opacity: 0;
        transform: translateY(-42px) scale(0.99);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes pillFadeIn {
      0% {
        opacity: 0;
        filter: blur(1.5px);
      }
      100% {
        opacity: 1;
        filter: blur(0);
      }
    }

    #map-frame {
      pointer-events: none;
      transform-origin: center;
      animation: mapReveal 0.74s cubic-bezier(0.22, 1, 0.36, 1) 0s both;
    }

    path {
      fill: #e6e6e6;
      stroke: #aeb8bd;
      stroke-width: 0.35;
      stroke-linejoin: round;
      stroke-linecap: round;
      paint-order: stroke fill;
      transition: fill 0.2s ease;
      transform-origin: center;
      animation: mapReveal 0.74s cubic-bezier(0.22, 1, 0.36, 1) 0s both;
    }

    #GB {
      fill: #253a46;
      stroke: #6f8894;
      stroke-width: 3;
      transition:
        fill 0.18s ease,
        stroke 0.18s ease,
        filter 0.18s ease;
      cursor: help;
    }

    #ES,
    #AT,
    #CZ,
    #DK {
      fill: #395563;
      stroke: #6f8894;
      stroke-width: 3;
      transition:
        fill 0.18s ease,
        stroke 0.18s ease,
        filter 0.18s ease;
      cursor: help;
    }

    #EE,
    #FI,
    #FR,
    #DE,
    #GR,
    #IS,
    #RO,
    #SE {
      fill: #537686;
      stroke: #6f8894;
      stroke-width: 3;
      transition:
        fill 0.18s ease,
        stroke 0.18s ease,
        filter 0.18s ease;
      cursor: help;
    }

    #GB:hover {
      fill: #1d2f39;
      stroke: #8aa0aa;
      filter: brightness(1.08);
    }

    #ES:hover,
    #AT:hover,
    #CZ:hover,
    #DK:hover {
      fill: #395867;
      stroke: #8aa0aa;
      filter: brightness(1.08);
    }

    #EE:hover,
    #FI:hover,
    #FR:hover,
    #DE:hover,
    #GR:hover,
    #IS:hover,
    #RO:hover,
    #SE:hover {
      fill: #55798a;
      stroke: #8aa0aa;
      filter: brightness(1.08);
    }

    .country-label {
      pointer-events: none;
      transform-origin: center;
      transition:
        transform 0.18s ease,
        filter 0.18s ease;
      transform: translate(var(--tx, 0px), var(--ty, 0px));
      opacity: 0;
      animation: pillFadeIn 0.44s ease var(--pill-delay, 1.05s) forwards;
    }

    .country-label.is-hover {
      filter: brightness(1.1);
      transform: translate(var(--tx, 0px), var(--ty, 0px)) scale(1.03);
    }

    .country-label .pill-bg {
      fill: rgba(243, 247, 248, 0.95);
      stroke: #6f8894;
      stroke-width: 2;
    }

    .country-label .pill-text,
    .country-label .code {
      text-anchor: middle;
      font-family: "Alexandria", sans-serif;
      dominant-baseline: middle;
    }

    .country-label .flag {
      font-size: 18.75px;
      stroke: none;
      font-family:
        "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
    }

    .country-label .code {
      fill: #2a414c;
      font-weight: 700;
      font-size: 13.5px;
    }

    #country-modal {
      display: none;
      pointer-events: none;
    }

    #country-modal.is-visible {
      display: block;
      pointer-events: none;
    }

    .modal-card {
      box-sizing: border-box;
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #9fb0b8;
      background: rgba(250, 252, 253, 0.97);
      color: #1f2f37;
      font-family: "Alexandria", sans-serif;
      line-height: 1.55;
      overflow: visible;
    }

    .modal-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      color: #253944;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-title-code {
      font-size: 13px;
      font-weight: 500;
      color: #5f7682;
      letter-spacing: 0.01em;
    }

    .modal-title-flag {
      font-size: 22px;
      line-height: 1;
      font-family:
        "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
    }

    .modal-divider {
      margin: 10px 0 12px;
      height: 2px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(111, 136, 148, 0.3));
    }

    .modal-section {
      margin-bottom: 10px;
    }

    .modal-section h4 {
      margin: 0 0 4px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #36515f;
    }

    .modal-section ul {
      margin: 0;
      padding-left: 16px;
      font-size: 12px;
    }

    .modal-section li {
      margin-bottom: 4px;
    }

    .modal-section.outlook {
      margin-top: 12px;
      margin-bottom: 0;
      padding: 10px 10px 8px;
      border-radius: 10px;
      background: linear-gradient(
        135deg,
        rgba(83, 118, 134, 0.14),
        rgba(83, 118, 134, 0.05)
      );
      border: 1px solid rgba(83, 118, 134, 0.35);
      border-left: 4px solid #527686;
      box-shadow: 0 1px 6px rgba(42, 65, 76, 0.12);
    }

    .modal-section.outlook h4 {
      color: #2a414c;
      font-size: 15px;
      margin-bottom: 6px;
    }

    .modal-section.outlook ul {
      font-size: 12.5px;
    }

    .modal-section.outlook li {
      margin-bottom: 0;
    }

    #map-legend {
      pointer-events: none;
      opacity: 0;
      transform: translateY(-42px);
      animation: legendDropIn 0.98s cubic-bezier(0.22, 0.72, 0.2, 1) 0.78s
        forwards;
    }

    .legend-card {
      box-sizing: border-box;
      width: fit-content;
      height: auto;
      padding: 1px 24px;
      border-radius: 14px;
      border: 1px solid rgba(123, 147, 158, 0.6);
      background: linear-gradient(
        180deg,
        rgba(250, 251, 246, 0.98) 0%,
        rgba(246, 248, 242, 0.98) 100%
      );
      box-shadow: 0 10px 22px rgba(42, 65, 76, 0.08);
      backdrop-filter: blur(2px);
      font-family: "Alexandria", sans-serif;
      color: #2a414c;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .legend-logo {
      margin-top: 6px;
      width: 184px;
      height: 56px;
      display: block;
      object-fit: contain;
      transform: translateY(-1px);
    }

    .legend-meta {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .legend-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin: 0;
    }

    .legend-row {
      display: flex;
      gap: 14px;
      align-items: center;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .legend-swatch {
      width: 20px;
      height: 20px;
      border-radius: 44px;
      border: 1px solid rgba(42, 65, 76, 0.35);
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1;
    }

    .legend-leading {
      background: #1d2f39;
    }

    .legend-development {
      background: #55798a;
    }

    .legend-momentum {
      background: #304a57;
    }

            const modal = document.getElementById("country-modal");

            const legendCard = legend.querySelector(".legend-card");

            const svgRoot = document.documentElement;
            const frameBox = { x: 94, y: 10, width: 986 };

            const countryStatus = {
              GB: "Leading",
              ES: "High Momentum",
              AT: "High Momentum",
              CZ: "High Momentum",
              DK: "High Momentum",
              EE: "In Development",
              FI: "In Development",

              DE: "In Development",

            };

              function formatItem(item) {
                if (!item) return "";
                const text = String(item).trim();

                // If item already has a clear label, bold that label.
                if (text.includes(":")) {
                  const idx = text.indexOf(":");
                  const head = text.slice(0, idx).trim();
                  const tail = text.slice(idx + 1).trim();
                  if (head.length > 0 && tail.length > 0) {
                    return `<strong>${head}:</strong> ${tail}`;
                  }
                }

                // Otherwise bold the first 3 words as a scan-friendly lead-in.
                const words = text.split(/\s+/);
                if (words.length <= 3) return `<strong>${text}</strong>`;
                const lead = words.slice(0, 3).join(" ");
                const rest = words.slice(3).join(" ");
                return `<strong>${lead}</strong> ${rest}`;
              }

              function positionModal(countryPath) {
                const modalWidth = 432;
                modal.setAttribute("width", modalWidth);
                const contentHeight = Math.ceil(modalCard.scrollHeight);
                const modalHeight = Math.max(120, contentHeight + 8);
                modal.setAttribute("height", modalHeight);

                const box = countryPath.getBBox();
                const vb = svgRoot.viewBox && svgRoot.viewBox.baseVal;
                const svgWidth =
                  vb && vb.width
                    ? vb.width
                    : parseFloat(svgRoot.getAttribute("width")) || 1000;
                const svgHeight =
                  vb && vb.height
                    ? vb.height
                    : parseFloat(svgRoot.getAttribute("height")) || 684;

                // Prefer right side (+24px from eastern border); fallback to left side if needed.
                const eastBorderX = box.x + box.width;
                const westBorderX = box.x;
                const gap = 0;
                const margin = 10;
                let x = eastBorderX + gap;
                let y = box.y + box.height / 2 - modalHeight / 6.5;

                // If right side doesn't fit, place it on the left of the country.
                if (x + modalWidth > svgWidth - margin) {
                  x = westBorderX - gap - modalWidth;
                }

                // Final viewport clamp.
                if (x < margin) {
                  x = margin;
                }
                if (x + modalWidth > svgWidth - margin) {
                  x = svgWidth - modalWidth - margin;
                }
                if (y + modalHeight > svgHeight - margin) {
                  y = svgHeight - modalHeight - margin;
                }
                if (y < margin) y = margin;

                modal.setAttribute("x", x.toFixed(1));
                modal.setAttribute("y", y.toFixed(1));
              }

              function sizeLegend() {
                const vb = svgRoot.viewBox && svgRoot.viewBox.baseVal;
                const svgWidth =
                  vb && vb.width
                    ? vb.width
                    : parseFloat(svgRoot.getAttribute("width")) || 1000;
                const width = Math.ceil(legendCard.scrollWidth);
                const height = Math.ceil(legendCard.scrollHeight);
                const finalWidth = width + 4;
                const finalHeight = height + 4;
                legend.setAttribute("width", finalWidth);
                legend.setAttribute("height", finalHeight);
              const x = frameBox.x + (frameBox.width - finalWidth) / 2;
              const y = frameBox.y + 34;
              legend.setAttribute("x", x.toFixed(1));
              legend.setAttribute("y", y.toFixed(1));
            }

              function renderSection(title, items) {
                if (!items || !items.length) return "";
                const list = items
                  .map((item) => `<li>${formatItem(item)}</li>`)
                  .join("");
                const outlookClass = title === "Outlook" ? " outlook" : "";
                return `<section class="modal-section${outlookClass}"><h4>${title}</h4><ul>${list}</ul></section>`;
              }

              function showModal(countryId, countryPath) {
                const info = countryInfo[countryId];
                if (!info) return;
                modalContent.innerHTML = `
                <h3 class="modal-title">
                  <span class="modal-title-flag">${info.flag}</span>
                  <span>${info.name}</span>
                  <span class="modal-title-code">(${countryStatus[countryId] || "-"})</span>
                </h3>
                  <hr class="modal-divider" />
                  ${renderSection("Academic", info.academic)}
                  ${renderSection("Policy", info.policy)}
                  ${renderSection("Practice", info.practice)}
                  ${renderSection("Outlook", info.outlook)}
                `;
                modal.classList.add("is-visible");
                requestAnimationFrame(() => {
                  positionModal(countryPath);
                });
              }

              const labels = document.querySelectorAll(
                "#country-labels .country-label",
              );
            labels.forEach((label, labelIndex) => {
              const countryId = label.getAttribute("data-country");
              const countryPath = document.getElementById(countryId);
              if (!countryPath) return;
              label.style.setProperty(
                "--pill-delay",
                `${(1.48 + labelIndex * 0.045).toFixed(3)}s`,
              );

              const box = countryPath.getBBox();
              const centerX = box.x + box.width / 2;
              const centerY = box.y + box.height / 2;
                label.style.setProperty("--tx", `${centerX.toFixed(1)}px`);
                label.style.setProperty("--ty", `${centerY.toFixed(1)}px`);

                const pillText = label.querySelector(".pill-text");
                const pillBg = label.querySelector(".pill-bg");
                if (pillText && pillBg) {
                  const textBox = pillText.getBBox();
                  const padX = 9;
                  const padY = 3;
                  const width = textBox.width + padX * 2;
                  const height = textBox.height + padY * 2;
                  pillBg.setAttribute("x", (-width / 2).toFixed(1));
                  pillBg.setAttribute("y", (-height / 2).toFixed(1));
                  pillBg.setAttribute("width", width.toFixed(1));
                  pillBg.setAttribute("height", height.toFixed(1));
                  pillBg.setAttribute("rx", (height / 2).toFixed(1));
                  pillBg.setAttribute("ry", (height / 2).toFixed(1));
                }

                countryPath.addEventListener("mouseenter", () => {
                  label.classList.add("is-hover");
                  showModal(countryId, countryPath);
                });
                countryPath.addEventListener("mouseleave", () => {
                  label.classList.remove("is-hover");
                  modal.classList.remove("is-visible");
                });
              });

              requestAnimationFrame(sizeLegend);
              if (legendLogo) {
                legendLogo.addEventListener("load", () => {
                  requestAnimationFrame(sizeLegend);
                });
                if (legendLogo.complete) {
                  requestAnimationFrame(sizeLegend);
                }
              }
            })();
    ]]>
  </script>
