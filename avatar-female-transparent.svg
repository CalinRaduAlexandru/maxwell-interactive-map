<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Avatar person female">
  <defs>
    <linearGradient id="fshirt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7d7aa6"/>
      <stop offset="100%" stop-color="#5f5b88"/>
    </linearGradient>
    <linearGradient id="fskin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3c9aa"/>
      <stop offset="100%" stop-color="#e2b28f"/>
    </linearGradient>
    <linearGradient id="fhair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a3848"/>
      <stop offset="100%" stop-color="#3f2833"/>
    </linearGradient>
  </defs>

  <!-- hair back -->
  <ellipse cx="100" cy="82" rx="43" ry="46" fill="url(#fhair)"/>
  <!-- face -->
  <circle cx="100" cy="82" r="27" fill="url(#fskin)"/>
  <!-- fringe -->
  <path d="M72 76c4-16 14-24 28-24s24 8 28 24c-10 2-18 8-28 8s-18-6-28-8z" fill="url(#fhair)"/>
  <!-- side hair locks -->
  <path d="M63 92c-1 16 4 30 14 42l9-20c-9-6-15-12-23-22z" fill="url(#fhair)"/>
  <path d="M137 92c1 16-4 30-14 42l-9-20c9-6 15-12 23-22z" fill="url(#fhair)"/>

  <!-- shirt/body -->
  <path d="M38 184c0-34 27-56 62-56s62 22 62 56" fill="url(#fshirt)"/>
  <!-- collar -->
  <path d="M68 136c8 8 18 12 32 12s24-4 32-12v14c-9 8-20 12-32 12s-23-4-32-12z" fill="#f9f7ff" opacity="0.78"/>
</svg>
